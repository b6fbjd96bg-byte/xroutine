<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Primary SEO -->
    <title>Superoutine — #1 Gamified Habit Tracker | Build Better Habits</title>
    <meta name="description" content="Superoutine is the gamified habit tracker that turns daily routines into lasting change. Earn XP, protect streaks, get smart analytics & build habits that stick. Free to start." />
    <meta name="keywords" content="habit tracker, gamified habit tracker, streak tracker, XP habit app, daily routine tracker, habit building app, behavioral change, productivity app, habit stacking, focus timer, habit analytics" />
    <meta name="author" content="Superoutine" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://superoutine.pro" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://superoutine.pro" />
    <meta property="og:title" content="Superoutine — #1 Gamified Habit Tracker" />
    <meta property="og:description" content="Stop tracking. Start transforming. Build better habits with XP leveling, streak protection, and smart analytics. Free to start." />
    <meta property="og:image" content="https://superoutine.pro/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Superoutine" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Superoutine" />
    <meta name="twitter:title" content="Superoutine — #1 Gamified Habit Tracker" />
    <meta name="twitter:description" content="Stop tracking. Start transforming. Build better habits with XP, streaks & analytics." />
    <meta name="twitter:image" content="https://superoutine.pro/og-image.png" />

    <!-- PWA & Theme -->
    <meta name="theme-color" content="#1a1f2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Superoutine" />

    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Superoutine",
      "url": "https://superoutine.pro",
      "description": "The gamified habit tracker that turns daily routines into lasting behavioral change. Earn XP, protect streaks, and level up your life.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1200"
      },
      "featureList": [
        "XP & Leveling System",
        "Streak Protection",
        "Smart Analytics",
        "Focus Mode Timer",
        "Habit Stacking",
        "Daily Planner",
        "Mood Check-in",
        "Achievement Badges"
      ]
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Superoutine",
      "url": "https://superoutine.pro",
      "logo": "https://superoutine.pro/logo.png",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Superoutine?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Superoutine is a gamified habit tracker that uses XP leveling, streak protection, and smart analytics to help you build lasting habits. It turns your daily routine into a game you want to play."
          }
        },
        {
          "@type": "Question",
          "name": "Is Superoutine free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Superoutine is free to start. You can track unlimited habits, earn XP, and access all core features without a credit card."
          }
        },
        {
          "@type": "Question",
          "name": "How does the XP system work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You earn XP every time you complete a habit. Daily habits give 10 XP and weekly habits give 25 XP. As you accumulate XP, you level up from Beginner to Habit Master."
          }
        },
        {
          "@type": "Question",
          "name": "What is streak protection?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Streak protection gives you one emergency skip per month. Life happens — if you miss a day, you can use your skip to keep your streak alive without penalty."
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
